{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Enter your credentials to access your account</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com"
                    required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                    required>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-2">Sign In <i
                    class="ri-login-circle-line"></i></button>
        </form>

        <div class="text-center mt-4">
            <p class="text-sm">Don't have an account? <a href="{{ url_for('auth.register') }}" class="font-bold">Sign
                    up</a></p>
        </div>
    </div>
</div>
{% endblock %}
